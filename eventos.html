<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | CLC System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F0F4F8;
            color: #1A2B4C;
            line-height: 1.5;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #FFFFFF;
            color: #1A2B4C;
            transition: transform 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.03);
            border-right: 1px solid #E8EDF2;
        }

        .sidebar-header {
            padding: 1.75rem 1.5rem;
            border-bottom: 1px solid #E8EDF2;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.875rem;
        }

        .logo-wrapper {
            width: 48px;
            height: 48px;
            min-width: 48px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(74, 144, 226, 0.25);
        }

        .logo-icon img {
            width: 90%;
            height: 90%;
            object-fit: cover;
            border-radius: 10px;
        }

        .sidebar-logo h2 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1A2B4C 0%, #4A90E2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-left: 10%;
        }

        .sidebar-nav {
            padding: 1.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.75rem 1rem;
            color: #5A6E8A;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 0.25rem;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(74, 144, 226, 0.08);
            color: #4A90E2;
        }

        .nav-item.active {
            background: rgba(74, 144, 226, 0.12);
            color: #4A90E2;
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .nav-divider {
            height: 1px;
            background: #E8EDF2;
            margin: 1rem 0;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            background: #FFFFFF;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #E8EDF2;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            color: #1A2B4C;
        }

        .menu-btn svg {
            width: 24px;
            height: 24px;
        }

        .navbar-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A2B4C;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-greeting {
            color: #5A6E8A;
            font-size: 0.875rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ========== PAGE HEADER ========== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A2B4C;
        }

        .page-title p {
            color: #5A6E8A;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
        }

        .search-box input {
            padding: 0.625rem 1rem;
            border: 1px solid #E8EDF2;
            border-radius: 12px;
            font-size: 0.875rem;
            width: 250px;
            background: #fff;
        }

        .search-box input:focus {
            outline: none;
            border-color: #4A90E2;
        }

        .btn-primary {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: #357ABD;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #E8EDF2;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #5A6E8A;
        }

        .btn-outline:hover {
            background: #F0F4F8;
            border-color: #4A90E2;
            color: #4A90E2;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #EF4444;
            color: #EF4444;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: #EF4444;
            color: white;
        }

        /* ========== EVENTS GRID ========== */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .event-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #E8EDF2;
        }

        .event-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.08);
        }

        .event-header {
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            padding: 1rem;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-icon {
            font-size: 2rem;
        }

        .event-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
        }

        .event-content {
            padding: 1.25rem;
        }

        .event-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #1A2B4C;
        }

        .event-slogan {
            color: #4A90E2;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .event-description {
            color: #5A6E8A;
            font-size: 0.875rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .event-info {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #E8EDF2;
        }

        .event-info-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.7rem;
            color: #5A6E8A;
        }

        .event-actions {
            display: flex;
            gap: 0.75rem;
        }

        /* ========== MODAL ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #fff;
            border-radius: 24px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalFadeIn 0.2s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #E8EDF2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #5A6E8A;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #E8EDF2;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #1A2B4C;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #E8EDF2;
            border-radius: 12px;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #4A90E2;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: #fff;
            border-radius: 20px;
            border: 1px solid #E8EDF2;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #5A6E8A;
            margin-bottom: 1.5rem;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1A2B4C;
            color: #fff;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-size: 0.875rem;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .events-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-btn {
                display: block;
            }
            .events-grid {
                grid-template-columns: 1fr;
            }
            .page-header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                flex-direction: column;
            }
            .search-box input {
                width: 100%;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>

                    </div>
                </div>

            </div>
        </div>
        <nav class="sidebar-nav">

            </a>
            <a href="inscricoes.html" class="nav-item">
                <span class="nav-icon">

                        <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

                        <path d="M16 3.13C17.9 3.61 19.2 5.41 19.2 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
                <span>Inscrições</span>

            <a href="avaliacoes.html" class="nav-item">

                    </svg>
                </span>
                <span>Avaliações</span>
            </a>
            <a href="perfil.html" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5 20V19C5 15.1 8.1 12 12 12C15.9 12 19 15.1 19 19V20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

            <div class="nav-divider"></div>
            <a href="#" onclick="api.logout()" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M9 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="navbar">
            <button class="menu-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="navbar-title">
                <h1>Eventos</h1>
            </div>
            <div class="user-info">
                <span class="user-greeting" id="userGreeting">Olá, Visitante</span>
                <div class="user-avatar" id="userAvatar">👤</div>
            </div>
        </div>

        <div class="container">
            <div class="page-header">
                <div class="page-title">
                    <h1>Eventos</h1>
                    <p>Gerencie todos os eventos da CLC</p>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar evento..." onkeyup="filtrarEventos()">
                    <button class="btn-primary" onclick="abrirModalEvento()">+ Novo Evento</button>
                </div>
            </div>

            <div id="eventosContainer" class="events-grid">
                <div style="text-align: center; grid-column: 1/-1; padding: 2rem;">Carregando...</div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalEvento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Evento</h3>
                <button class="modal-close" onclick="fecharModalEvento()">&times;</button>
            </div>
            <form id="eventoForm">
                <div class="modal-body">
                    <div class="input-group">
                        <label>Nome do Evento *</label>
                        <input type="text" id="eventoNome" required>
                    </div>
                    <div class="input-group">
                        <label>Slogan</label>
                        <input type="text" id="eventoSlogan">
                    </div>
                    <div class="input-group">
                        <label>Descrição</label>
                        <textarea id="eventoDescricao" rows="3"></textarea>
                    </div>
                    <div class="input-group">
                        <label>Data *</label>
                        <input type="date" id="eventoData" required>
                    </div>
                    <div class="input-group">
                        <label>Hora</label>
                        <input type="time" id="eventoHora">
                    </div>
                    <div class="input-group">
                        <label>Local</label>
                        <input type="text" id="eventoLocal">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline" onclick="fecharModalEvento()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Evento</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let eventosData = [];
        let eventoEditando = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function formatarData(dataString) {
            if (!dataString) return 'Data não definida';
            try {
                const data = new Date(dataString);
                return data.toLocaleDateString('pt-BR');
            } catch {
                return dataString;
            }
        }

        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensagem;
            toast.style.background = tipo === 'success' ? '#22C55E' : '#EF4444';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function carregarEventos() {
            try {
                eventosData = await api.getEventos();
                renderizarEventos();
            } catch (error) {
                document.getElementById('eventosContainer').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Erro ao carregar eventos</h3>
                        <button class="btn-primary" onclick="carregarEventos()">Tentar novamente</button>
                    </div>
                `;
            }
        }

        function renderizarEventos() {
            const container = document.getElementById('eventosContainer');
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';

            let filtered = eventosData;
            if (searchTerm) {
                filtered = eventosData.filter(e => 
                    e.nome?.toLowerCase().includes(searchTerm) || 
                    e.descricao?.toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📭</div>
                        <h3>Nenhum evento encontrado</h3>
                        <p>${searchTerm ? 'Tente outra busca' : 'Crie seu primeiro evento agora!'}</p>
                        ${!searchTerm ? '<button class="btn-primary" onclick="abrirModalEvento()">+ Criar Evento</button>' : ''}
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(evento => `
                <div class="event-card">
                    <div class="event-header">
                        <div class="event-icon">🎪</div>
                        <div class="event-badge">${new Date(evento.data) >= new Date() ? 'Em breve' : 'Realizado'}</div>
                    </div>
                    <div class="event-content">
                        <h3 class="event-title">${evento.nome || 'Sem nome'}</h3>
                        ${evento.slogan ? `<p class="event-slogan">✨ ${evento.slogan}</p>` : ''}
                        <p class="event-description">${evento.descricao?.substring(0, 100) || 'Sem descrição'}${evento.descricao?.length > 100 ? '...' : ''}</p>
                        <div class="event-info">
                            <span class="event-info-item">📅 ${formatarData(evento.data)}</span>
                            ${evento.hora ? `<span class="event-info-item">⏰ ${evento.hora.substring(0,5)}</span>` : ''}
                            <span class="event-info-item">📍 ${evento.local || 'Local a definir'}</span>
                        </div>
                        <div class="event-actions">
                            <button class="btn-outline" onclick="editarEvento(${evento.idEvento})">✏️ Editar</button>
                            <button class="btn-danger" onclick="excluirEvento(${evento.idEvento})">🗑️ Excluir</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtrarEventos() {
            renderizarEventos();
        }

        function abrirModalEvento() {
            eventoEditando = null;
            document.getElementById('modalTitle').textContent = 'Novo Evento';
            document.getElementById('eventoForm').reset();
            document.getElementById('modalEvento').style.display = 'flex';
        }

        async function editarEvento(id) {
            const evento = eventosData.find(e => e.idEvento === id);
            if (!evento) return;
            eventoEditando = evento;
            document.getElementById('modalTitle').textContent = 'Editar Evento';
            document.getElementById('eventoNome').value = evento.nome || '';
            document.getElementById('eventoSlogan').value = evento.slogan || '';
            document.getElementById('eventoDescricao').value = evento.descricao || '';
            document.getElementById('eventoData').value = evento.data || '';
            document.getElementById('eventoHora').value = evento.hora || '';
            document.getElementById('eventoLocal').value = evento.local || '';
            document.getElementById('modalEvento').style.display = 'flex';
        }

        async function excluirEvento(id) {
            if (!confirm('Tem certeza que deseja excluir este evento?')) return;
            try {
                await api.deletarEvento(id);
                mostrarToast('Evento excluído com sucesso!');
                carregarEventos();
            } catch (error) {
                mostrarToast('Erro ao excluir evento', 'error');
            }
        }

        function fecharModalEvento() {
            document.getElementById('modalEvento').style.display = 'none';
        }

        document.getElementById('eventoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const evento = {
                nome: document.getElementById('eventoNome').value,
                slogan: document.getElementById('eventoSlogan').value,
                descricao: document.getElementById('eventoDescricao').value,
                data: document.getElementById('eventoData').value,
                hora: document.getElementById('eventoHora').value,
                local: document.getElementById('eventoLocal').value
            };
            try {
                if (eventoEditando) {
                    await api.atualizarEvento(eventoEditando.idEvento, evento);
                    mostrarToast('Evento atualizado com sucesso!');
                } else {
                    await api.salvarEvento(evento);
                    mostrarToast('Evento criado com sucesso!');
                }
                fecharModalEvento();
                carregarEventos();
            } catch (error) {
                mostrarToast('Erro ao salvar evento', 'error');
            }
        });

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userGreeting').innerHTML = `Olá, ${user.nome?.split(' ')[0] || 'Visitante'}`;
        document.getElementById('userAvatar').textContent = (user.nome?.charAt(0) || 'U').toUpperCase();

        carregarEventos();
    </script>
</body>
</html>
